  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<title>Accessibility First Series — Guide 1 Mockup<\u002Ftitle>\n<script src=\"b51fdbf4-0661-478b-9d05-a2ccf181dbee\"><\u002Fscript>\n<script src=\"5494787d-d934-4b44-ad2c-45aed2461558\"><\u002Fscript>\n\n\n\n<style>\n  :root {\n    --navy: #192858;\n    --navy-deep: #0F1A3D;\n    --red: #C0233B;\n    --red-bg: #FDF2F3;\n    --cobalt: #245BAA;\n    --cobalt-bg: #EAF1FA;\n    --lilac: #C48ABD;\n    --lilac-bg: #F7EDF5;\n    --chartreuse: #74AE54;\n    --chartreuse-bg: #EEF6E7;\n    --neutral: #E4E4E4;\n    --neutral-2: #F4F4F4;\n    --ink: #111111;\n    --muted: #5A5A5A;\n    --font-head: \"Arial Black\", \"Arial Bold\", Arial, sans-serif;\n    --font-body: Arial, Helvetica, sans-serif;\n  }\n\n  html, body { margin: 0; padding: 0; background: #1a1a1a; font-family: var(--font-body); color: var(--ink); }\n\n  /* === Slide canvas === */\n  deck-stage > section {\n    width: 1920px;\n    height: 1080px;\n    background: #fff;\n    position: relative;\n    overflow: hidden;\n    font-size: 24px;\n    line-height: 1.45;\n  }\n\n  /* === Common chrome === */\n  .chrome {\n    position: absolute;\n    inset: 0;\n    pointer-events: none;\n  }\n  .chrome-footer {\n    position: absolute;\n    left: 64px; right: 64px; bottom: 36px;\n    display: flex; justify-content: space-between; align-items: center;\n    font-family: var(--font-body); font-size: 18px; color: #8A8A8A;\n    letter-spacing: 1px; text-transform: uppercase;\n  }\n  .chrome-footer .left { display: flex; gap: 18px; align-items: center; }\n  .chrome-footer .tag {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-family: var(--font-head); font-size: 14px; color: var(--navy);\n    letter-spacing: 2px;\n  }\n  .chrome-footer .tag::before {\n    content: \"\"; width: 8px; height: 8px; background: var(--red); display: inline-block;\n  }\n  .progress {\n    display: flex; gap: 6px; align-items: center;\n  }\n  .progress .dot { width: 22px; height: 4px; background: #DCDCDC; }\n  .progress .dot.on { background: var(--navy); }\n  .progress .dot.cur { background: var(--red); }\n\n  /* === Top header bar (on white slides) === */\n  .topbar {\n    position: absolute; top: 0; left: 0; right: 0; height: 84px;\n    background: var(--navy); color: #fff;\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 0 64px;\n  }\n  .topbar .brand {\n    display: flex; align-items: center; gap: 18px;\n    font-family: var(--font-head); font-size: 20px; letter-spacing: 3px; text-transform: uppercase;\n  }\n  .topbar .brand img.logo {\n    height: 48px; width: auto; display: block;\n  }\n  .topbar .brand .sep {\n    width: 1px; height: 36px; background: rgba(255,255,255,0.25);\n  }\n  .topbar .brand .ctx {\n    font-family: var(--font-head); font-size: 20px; letter-spacing: 3px;\n    color: rgba(255,255,255,0.85);\n  }\n  .topbar .crumbs {\n    font-family: var(--font-body); font-size: 18px; color: rgba(255,255,255,0.75);\n    letter-spacing: 1px;\n  }\n  .topbar .crumbs b { color: #fff; }\n\n  /* Slide title block under topbar */\n  .title-block { padding: 108px 96px 0; }\n  .title-block .eyebrow {\n    font-family: var(--font-head); font-size: 18px; letter-spacing: 4px;\n    text-transform: uppercase; color: var(--red); margin-bottom: 14px;\n  }\n  .title-block h1 {\n    font-family: var(--font-head); font-size: 56px; line-height: 1.05;\n    color: var(--navy); margin: 0 0 14px;\n  }\n  .title-block h1 .accent { color: var(--red); }\n  .title-block .lede {\n    font-size: 24px; color: #333; max-width: 1100px; line-height: 1.4;\n  }\n\n  /* Image / photo placeholder */\n  .photo {\n    background:\n      repeating-linear-gradient(135deg, #EAEAEA 0 14px, #F4F4F4 14px 28px);\n    border: 1px solid #DCDCDC;\n    position: relative;\n  }\n  .photo::after {\n    content: attr(data-label);\n    position: absolute; left: 16px; bottom: 14px;\n    font-family: \"Courier New\", monospace; fon ound: var(--red); color: #fff; border-color: var(--red); }\n\n  /* Feedback row */\n  .tree-feedback {\n    margin: 18px 96px 0;\n    display: grid; grid-template-columns: 1.2fr 1fr; gap: 18px;\n  }\n  .tree-feedback .fb-card {\n    background: #fff; border: 1px solid var(--neutral);\n    padding: 20px 26px; display: flex; flex-direction: column; gap: 8px;\n  }\n  .tree-feedback .fb-card .fb-head {\n    display: flex; align-items: center; gap: 12px;\n  }\n  .tree-feedback .fb-card .fb-pill {\n    font-family: var(--font-head); font-size: 10px; letter-spacing: 2px;\n    padding: 4px 10px; text-transform: uppercase; color: #fff;\n  }\n  .tree-feedback .fb-card.good .fb-pill { background: var(--chartreuse); }\n  .tree-feedback .fb-card.good { border-left: 4px solid var(--chartreuse); }\n  .tree-feedback .fb-card h4 {\n    font-family: var(--font-head); font-size: 18px; color: var(--navy); margin: 0;\n  }\n  .tree-feedback .fb-card p {\n    font-size: 14px; color: #222; line-height: 1.45; margin: 0;\n  }\n  .tree-feedback .fb-coach {\n    background: var(--cobalt-bg); border-left: 4px solid var(--cobalt);\n    padding: 20px 26px;\n  }\n  .tree-feedback .fb-coach .lbl {\n    font-family: var(--font-head); font-size: 12px; letter-spacing: 2px;\n    color: var(--cobalt); text-transform: uppercase; margin-bottom: 6px;\n  }\n  .tree-feedback .fb-coach h4 {\n    font-family: var(--font-head); font-size: 16px; color: var(--navy); margin: 0 0 8px;\n  }\n  .tree-feedback .fb-coach .path {\n    display: flex; align-items: center; gap: 6px;\n    margin-top: 8px; flex-wrap: wrap;\n  }\n  .tree-feedback .fb-coach .path .step {\n    font-family: var(--font-head); font-size: 10px; letter-spacing: 1px;\n    background: #fff; border: 1px solid var(--cobalt); color: var(--cobalt);\n    padding: 4px 8px; text-transform: uppercase;\n  }\n  .tree-feedback .fb-coach .path .step.on {\n    background: var(--cobalt); color: #fff;\n  }\n  .tree-feedback .fb-coach .path .arr { color: var(--cobalt); font-weight: bold; }\n\n  /* === Slide 12: Phased journey visualisation === */\n  .journey {\n    padding: 12px 96px 0;\n  }\n  .journey-stages {\n    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0;\n    align-items: stretch;\n  }\n  .j-stage {\n    background: #fff; border: 1px solid var(--neutral);\n    display: flex; flex-direction: column;\n    position: relative;\n  }\n  .j-stage + .j-stage { margin-left: 18px; }\n  .j-stage::before {\n    content: \"\"; position: absolute;\n    left: -19px; top: 50%; width: 20px; height: 2px;\n    background: var(--neutral);\n  }\n  .j-stage:first-child::before { display: none; }\n  .j-stage::after {\n    content: \"\"; position: absolute;\n    left: -10px; top: calc(50% - 8px);\n    width: 0; height: 0;\n    border-top: 9px solid transparent; border-bottom: 9px solid transparent;\n    border-left: 12px solid var(--neutral);\n  }\n  .j-stage:first-child::after { display: none; }\n  .j-stage.unlocked::before,\n  .j-stage.active::before { background: var(--cobalt); }\n  .j-stage.unlocked::after,\n  .j-stage.active::after { border-left-color: var(--cobalt); }\n\n  .j-head {\n    padding: 16px 20px; border-bottom: 1px solid var(--neutral);\n    display: flex; align-items: center; gap: 14px;\n  }\n  .j-head .stage-num {\n    font-family: var(--font-head); font-size: 22px; color: var(--navy);\n    width: 44px; height: 44px; border: 2px solid var(--navy);\n    display: grid; place-items: center; flex-shrink: 0;\n  }\n  .j-head .stage-info { flex: 1; }\n  .j-head .stage-name {\n    font-family: var(--font-head); font-size: 16px; color: var(--navy);\n    letter-spacing: 1px; text-transform: uppercase;\n  }\n  .j-head .stage-sub {\n    font-size: 12px; color: var(--muted); margin-top: 2px;\n  }\n  .j-head .stage-status {\n    font-family: var(--font-head); font-size: 11px; letter-spacing: 2px;\n    padding: 5px 10px; text-transform: uppercase;\n  }\n  .j-head .stage-status.active { background: var(--cobalt); color: #fff; }\n  .j-head .stage-status.unlocked { background: var(--chartreuse); color: #fff; }\n  .j-head .stage-status.locked { background: var(--neutral); color: var(--muted); }\n\n  .j-locked-overlay {\n    position: absolute; inset: 0;\n    background: rgba(244,244,244,0.86);\n    display: flex; flex-direction: column; align-items: center; justify-content: center;\n    gap: 10px;\n    z-index: 2;\n    pointer-events: none;\n  }\n  .j-stage:not(.locked) .j-locked-overlay { display: none; }\n  .j-locked-overlay .lock {\n    width: 44px; height: 44px; border-radius: 50%;\n    background: var(--navy); color: #fff;\n    display: grid; place-items: center;\n  }\n  .j-locked-overlay .lock svg { width: 22px; height: 22px; }\n  .j-locked-overlay .lock-text {\n    font-family: var(--font-head); font-size: 11px; letter-spacing: 2px;\n    color: var(--navy); text-transform: uppercase; text-align: center;\n    background: #fff; padding: 6px 12px; border: 1px solid var(--neutral);\n  }\n\n  .j-list {\n    flex: 1; padding: 12px 16px;\n    display: flex; flex-direction: column; gap: 5px;\n  }\n  .j-row {\n    display: flex; align-items: center; gap: 10px;\n    padding: 7px 10px;\n    background: #fff; border: 1px solid var(--neutral);\n    min-height: 38px;\n  }\n  .j-row .jn {\n    font-family: var(--font-head); font-size: 14px; color: var(--navy);\n    min-width: 24px;\n  }\n  .j-row .jt {\n    flex: 1; font-size: 13px; color: #222; line-height: 1.3;\n  }\n  .j-row .js {\n    font-family: var(--font-head); font-size: 9px; letter-spacing: 1.5px;\n    padding: 3px 7px; text-transform: uppercase; white-space: nowrap;\n  }\n  .js.done { background: var(--chartreuse); color: #fff; }\n  .js.cur { background: var(--cobalt); color: #fff; }\n  .js.todo { background: var(--neutral); color: var(--muted); }\n  .j-row.current { border-color: var(--cobalt); border-width: 2px; padding: 6px 9px; }\n  .j-row.done .jn { color: var(--chartreuse); }\n  .j-row.done .jt { color: var(--muted); }\n\n  .j-prereq {\n    margin: 0 14px 14px; padding: 8px 12px;\n    background: var(--cobalt-bg); border-left: 3px solid var(--cobalt);\n    font-size: 11px; line-height: 1.4; color: var(--ink);\n  }\n  .j-prereq b { color: var(--cobalt); font-family: var(--font-head); letter-spacing: 1px; }\n\n  /* path indicator above journey */\n  .j-path {\n    display: flex; align-items: center; gap: 12px;\n    margin-bottom: 18px;\n    font-family: var(--font-head); font-size: 12px; letter-spacing: 3px; color: var(--muted);\n    text-transform: uppercase;\n  }\n  .j-path .ball {\n    width: 14px; height: 14px; border-radius: 50%; background: var(--neutral);\n  }\n  .j-path .ball.on { background: var(--cobalt); }\n  .j-path .ball.done { background: var(--chartreuse); }\n  .j-path .line { height: 2px; background: var(--neutral); flex: 1; }\n  .j-path .line.on { background: var(--cobalt); }\n  .j-path .line.done { background: var(--chartreuse); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<deck-stage>\n\n  <!-- ============================================== -->\n  <!-- SLIDE 1 — TITLE                                -->\n  <!-- ============================================== -->\n  <section class=\"s-title\" data-screen-label=\"01 Title\">\n    <div class=\"left\">\n      <div>\n        <div class=\"brandline\">\n          <img class=\"logo\" src=\"7d104576-0392-4d89-8389-96b5ae5bfd12\" alt=\"UHN — Canada’s Hospital\">\n        <\u002Fdiv>\n        <div style=\"margin-top:18px; font-family:var(--font-head); font-size:20px; letter-spacing:4px; color:var(--lilac); text-transform:uppercase;\">Accessibility First Series<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"guide-num\">Guide 01 of 18 · Foundations<\u002Fdiv>\n        <h1>\n          <span class=\"series\">Accessibility First Series · Advancing Dignity, Inclusion &amp; Equitable Care<\u002Fspan>\n          Foundations of Disability,<br>Inclusion &amp; <span style=\"color:var(--lilac)\">Accessible Design<\u002Fspan>\n        <\u002Fh1>\n        <p class=\"sub\">An introduction to the principles, models, and everyday practices that shape accessible care at the University Health Network.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"meta-row\">\n        <div class=\"meta\">Duration<b>22 minutes<\u002Fb><\u002Fdiv>\n        <div class=\"meta\">Format<b>Self-paced · Storyline 360<\u002Fb><\u002Fdiv>\n        <div class=\"meta\">Audience<b>All UHN Staff<\u002Fb><\u002Fdiv>\n        <div class=\"meta\">Last Updated<b>May 2026 · v1.0<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"right\">\n      <image-slot id=\"s01-hero\" class=\"hero-photo\" shape=\"rect\" placeholder=\"Drop a hero photo\">\n        <span class=\"floating\">Hero · slot<\u002Fspan>\n      <\u002Fimage-slot>\n      <div class=\"start-bar\">\n        <div>\n          <div class=\"status\">Welcome back, Jordan<\u002Fdiv>\n          <div style=\"font-family:var(--font-head); font-size:22px; color:var(--navy); margin-top:4px; letter-spacing:1px;\">Resume where you left off · Slide 4<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cta\">Continue Module<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================== -->\n  <!-- SLIDE 2 — LEARNING OBJECTIVES                  -->\n  <!-- ============================================== -->\n  <section class=\"s-obj\" data-screen-label=\"02 Learning Objectives\">\n    <div class=\"topbar\">\n      <div class=\"brand-wrap\"><button class=\"menu-btn\" data-nav=\"open\" aria-label=\"Open course menu\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"><\u002Fline><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"><\u002Fline><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fbutton><div class=\"brand\"><img class=\"logo\" src=\"7d104576-0392-4d89-8389-96b5ae5bfd12\" alt=\"UHN — Canada’s Hospital\"><span class=\"sep\"><\u002Fspan><span class=\"ctx\">Accessibility First<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"crumbs\">Guide 01 · Foundations &nbsp;›&nbsp; <b>Learning Objectives<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"title-block\">\n      <div class=\"eyebrow\">Section 01 · What you will learn<\u002Fdiv>\n      <h1>Learning Objectives<\u002Fh1>\n      <p class=\"lede\">By the end of this guide, you will be able to describe the foundations of disability and inclusion, and apply them to everyday decisions in clinical, administrative, and operational care.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"obj-grid\">\n      <div class=\"obj-card\">\n        <div class=\"num\">01<\u002Fdiv>\n        <div class=\"body\">\n          <h3>Define disability through multiple lenses<\u002Fh3>\n          <p>Distinguish between the medical, social, and human-rights models of disability, and recognize how each shapes care.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"obj-card\">\n        <div class=\"num\">02<\u002Fdiv>\n        <div class=\"body\">\n          <h3>Identify visible and invisible barriers<\u002Fh3>\n          <p>Recognize the physical, sensory, attitudinal, communication, and systemic barriers a person may encounter at UHN.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"obj-card featured\">\n        <div class=\"num\">03<\u002Fdiv>\n        <div class=\"body\">\n          <h3>Apply the Accessibility in Practice model<\u002Fh3>\n          <p>Use the four areas — Awareness, Communication, Environment, and Response — to guide everyday decisions.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"obj-card\">\n        <div class=\"num\">04<\u002Fdiv>\n        <div class=\"body\">\n          <h3>Use the 5-step Decision Path<\u002Fh3>\n          <p>Pause and assess, listen, apply, adapt, and seek support when an accessibility need is identified.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-footer\">\n      <div class=\"left\">\n        <span class=\"tag\">Guide 01<\u002Fspan>\n        <span>Foundations of Disability, Inclusion &amp; Accessible Design<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================== -->\n  <!-- SLIDE 3 — WHY THIS MATTERS                     -->\n  <!-- ============================================== -->\n  <section class=\"s-why\" data-screen-label=\"03 Why This Matters\">\n    <div class=\"topbar\">\n      <div class=\"brand-wrap\"><button class=\"menu-btn\" data-nav=\"open\" aria-label=\"Open course menu\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"><\u002Fline><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"><\u002Fline><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fbutton><div class=\"brand\"><img class=\"logo\" src=\"7d104576-0392-4d89-8389-96b5ae5bfd12\" alt=\"UHN — Canada’s Hospital\"><span class=\"sep\"><\u002Fspan><span class=\"ctx\">Accessibility First<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"crumbs\">Guide 01 · Foundations &nbsp;›&nbsp; <b>Why this matters in healthcare<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"title-block\">\n      <div class=\"eyebrow\">Section 02 · Healthcare relevance<\u002Fdiv>\n      <h1>Why this matters in <span class=\"accent\">healthcare<\u002Fspan><\u002Fh1>\n      <p class=\"lede\">Accessibility is not a separate program. It is the difference between a patient feeling seen and a patient leaving without the care they came for.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"why-grid\">\n      <image-slot id=\"s03-reception\" class=\"photo\" shape=\"rect\" placeholder=\"Drop a reception-scene photo\">\n        <span class=\"badge\">SCENE · RECEPTION<\u002Fspan>\n      <\u002Fimage-slot>\n      <div class=\"why-body\">\n        <div class=\"stat-block\">\n          <div class=\"num\">1 in 4<\u002Fdiv>\n          <div class=\"text\">Canadian adults aged 15+ live with one or more disabilities. <b>That is a quarter of the patients, families, and colleagues you serve every shift.<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n\n        <p>Most accessibility decisions at UHN are made not in policy meetings — they are made at reception desks, in exam rooms, during phone intakes, and in the brief seconds before a person speaks.<\u002Fp>\n        <p>Foundations matter because they make those split-second decisions consistent, dignified, and legally sound.<\u002Fp>\n\n        <div class=\"key-takeaway\">\n          <div class=\"lbl\">Key Takeaway<\u002Fdiv>\n          <p>Every interaction at UHN is an accessibility decision — whether we name it that or not.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-footer\">\n      <div class=\"left\">\n        <span class=\"tag\">Guide 01<\u002Fspan>\n        <span>Foundations of Disability, Inclusion &amp; Accessible Design<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================== -->\n  <!-- SLIDE 4 — CORE CONCEPT                         -->\n  <!-- ============================================== -->\n  <section class=\"s-core\" data-screen-label=\"04 Core Concept\">\n    <div class=\"topbar\">\n      <div class=\"brand-wrap\"><button class=\"menu-btn\" data-nav=\"open\" aria-label=\"Open course menu\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"><\u002Fline><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"><\u002Fline><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fbutton><div class=\"brand\"><img class=\"logo\" src=\"7d104576-0392-4d89-8389-96b5ae5bfd12\" alt=\"UHN — Canada’s Hospital\"><span class=\"sep\"><\u002Fspan><span class=\"ctx\">Accessibility First<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"crumbs\">Guide 01 · Foundations &nbsp;›&nbsp; <b>Core concept<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"title-block\">\n      <div class=\"eyebrow\">Section 03 · A bigger definition<\u002Fdiv>\n      <h1>Accessibility is more than <span class=\"accent\">ramps and railings<\u002Fspan><\u002Fh1>\n      <p class=\"lede\">Physical access is the most visible barrier — but most of what UHN gets wrong every day is invisible until we look for it.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"core-grid\">\n      <div class=\"core-concept\">\n        <span class=\"pill\">Concept<\u002Fspan>\n        <h2>Accessibility is the removal of any barrier that keeps a person from full, dignified participation in care.<\u002Fh2>\n        <p>Barriers can be physical, but they can also be attitudinal, communication-based, technological, sensory, or systemic. Every barrier removed widens the door for someone.<\u002Fp>\n\n        <div class=\"concept-pillars\">\n          <div class=\"p\"><b>Physical<\u002Fb>Doors, paths, seating, exam tables, parking.<\u002Fdiv>\n          <div class=\"p\"><b>Communication<\u002Fb>Plain language, signage, formats, interpretation.<\u002Fdiv>\n          <div class=\"p\"><b>Attitudinal<\u002Fb>Assumptions, tone, body language, deference.<\u002Fdiv>\n          <div class=\"p\"><b>Systemic<\u002Fb>Forms, scheduling, intake, signage, policy.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"core-example\">\n        <div class=\"lbl\">Healthcare Example<\u002Fdiv>\n        <image-slot id=\"s04-phone\" class=\"photo\" shape=\"rect\" placeholder=\"Drop a detail photo\">\n          <span class=\"badge\">EXAMPLE<\u002Fspan>\n        <\u002Fimage-slot>\n        <p class=\"ex\">A patient is late to an appointment. The barrier isn't mobility. <b>It is an appointment reminder sent only as an image — unreadable by the screen reader they rely on.<\u002Fb><\u002Fp>\n        <p class=\"ex\" style=\"font-size:18px;color:var(--muted);\">Fixing the building doesn't fix the visit. Fixing the message does.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-footer\">\n      <div class=\"left\">\n        <span class=\"tag\">Guide 01<\u002Fspan>\n        <span>Foundations of Disability, Inclusion &amp; Accessible Design<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================== -->\n  <!-- SLIDE 5 — ACCESSIBILITY IN PRACTICE MODEL      -->\n  <!-- ============================================== -->\n  <section class=\"s-model\" data-screen-label=\"05 Practice Model\">\n    <div class=\"topbar\">\n      <div class=\"brand-wrap\"><button class=\"menu-btn\" data-nav=\"open\" aria-label=\"Open course menu\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"><\u002Fline><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"><\u002Fline><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fbutton><div class=\"brand\"><img class=\"logo\" src=\"7d104576-0392-4d89-8389-96b5ae5bfd12\" alt=\"UHN — Canada’s Hospital\"><span class=\"sep\"><\u002Fspan><span class=\"ctx\">Accessibility First<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"crumbs\">Guide 01 · Foundations &nbsp;›&nbsp; <b>Accessibility in Practice Model<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"title-block\">\n      <div class=\"eyebrow\">Section 04 · The four areas — used across all 18 guides<\u002Fdiv>\n      <h1>The Accessibility in Practice Model<\u002Fh1>\n      <p class=\"lede\">A shared model that lets every team — clinical, administrative, operational, and leadership — talk about accessibility in the same language.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"model-grid\">\n      <div class=\"model-card\">\n        <div class=\"head\"><span class=\"icon\" data-icon=\"eye\"><\u002Fspan><span class=\"num\">01<\u002Fspan><h3>Awareness<\u002Fh3><\u002Fdiv>\n        <div class=\"body\">\n          Recognize that a person may have visible or invisible accessibility needs — without making them ask first.\n          <ul>\n            <li>Scan environments and forms.<\u002Fli>\n            <li>Notice assistive devices.<\u002Fli>\n            <li>Watch your own assumptions.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"model-card\">\n        <div class=\"head\"><span class=\"icon\" data-icon=\"speech\"><\u002Fspan><span class=\"num\">02<\u002Fspan><h3>Communication<\u002Fh3><\u002Fdiv>\n        <div class=\"body\">\n          Use plain, respectful language and confirm the person's preferred way to receive information.\n          <ul>\n            <li>Ask about preferred format.<\u002Fli>\n            <li>Speak to the patient, not the companion.<\u002Fli>\n            <li>Slow down when needed.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"model-card\">\n        <div class=\"head\"><span class=\"icon\" data-icon=\"door\"><\u002Fspan><span class=\"num\">03<\u002Fspan><h3>Environment<\u002Fh3><\u002Fdiv>\n        <div class=\"body\">\n          Adapt the space so the person can move, see, hear, and rest without unnecessary effort.\n          <ul>\n            <li>Clear paths and seating.<\u002Fli>\n            <li>Lighting and signage.<\u002Fli>\n            <li>Quiet space if needed.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"model-card\">\n        <div class=\"head\"><span class=\"icon\" data-icon=\"hand\"><\u002Fspan><span class=\"num\">04<\u002Fspan><h3>Response<\u002Fh3><\u002Fdiv>\n        <div class=\"body\">\n          Adjust your actions in the moment, document what worked, and pass the learning forward.\n          <ul>\n            <li>Offer — don't impose — help.<\u002Fli>\n            <li>Confirm what worked.<\u002Fli>\n            <li>Update the chart or note.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"model-summary\">\n      <span class=\"lbl\">Reflection<\u002Fspan>\n      <p>The four areas are not a checklist. They are four lenses you can move between in any interaction — sometimes within the same minute.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"chrome-footer\">\n      <div class=\"left\">\n        <span class=\"tag\">Guide 01<\u002Fspan>\n        <span>Foundations of Disability, Inclusion &amp; Accessible Design<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================== -->\n  <!-- SLIDE 6 — DECISION PATH                        -->\n  <!-- ============================================== -->\n  <section class=\"s-decision\" data-screen-label=\"06 Decision Path\">\n    <div class=\"topbar\">\n      <div class=\"brand-wrap\"><button class=\"menu-btn\" data-nav=\"open\" aria-label=\"Open course menu\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"><\u002Fline><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"><\u002Fline><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fbutton><div class=\"brand\"><img class=\"logo\" src=\"7d104576-0392-4d89-8389-96b5ae5bfd12\" alt=\"UHN — Canada’s Hospital\"><span class=\"sep\"><\u002Fspan><span class=\"ctx\">Accessibility First<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"crumbs\">Guide 01 · Foundations &nbsp;›&nbsp; <b>Accessibility Decision Path<\u002Fb> · Interactive<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"title-block\">\n      <div class=\"eyebrow\">Section 05 · 5 steps · click any step to learn more<\u002Fdiv>\n      <h1>The Accessibility Decision Path<\u002Fh1>\n      <p class=\"lede\">A repeatable 5-step path you can use whenever an accessibility need appears — at intake, in the hallway, on a call, or in an exam room.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"stepper\">\n      <div class=\"stepper-rail\">\n        <div class=\"step done\">\n          <div class=\"circle\">1<\u002Fdiv>\n          <span class=\"step-ico\" data-icon=\"pause\"><\u002Fspan>\n          <div class=\"label\">Pause &amp; Assess<\u002Fdiv>\n          <div class=\"desc\">Notice the situation before you respond.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"step done\">\n          <div class=\"circle\">2<\u002Fdiv>\n          <span class=\"step-ico\" data-icon=\"ear\"><\u002Fspan>\n          <div class=\"label\">Listen &amp; Ask<\u002Fdiv>\n          <div class=\"desc\">Let the person describe what they need.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"step active\">\n          <div class=\"circle\">3<\u002Fdiv>\n          <span class=\"step-ico\" data-icon=\"apply\"><\u002Fspan>\n          <div class=\"label\">Apply<\u002Fdiv>\n          <div class=\"desc\">Use the method that fits — not the default.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"step\">\n          <div class=\"circle\">4<\u002Fdiv>\n          <span class=\"step-ico\" data-icon=\"adapt\"><\u002Fspan>\n          <div class=\"label\">Adapt<\u002Fdiv>\n          <div class=\"desc\">Adjust as you learn what is working.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"step\">\n          <div class=\"circle\">5<\u002Fdiv>\n          <span class=\"step-ico\" data-icon=\"people\"><\u002Fspan>\n          <div class=\"label\">Seek Support<\u002Fdiv>\n          <div class=\"desc\">Call in the right colleague or service.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"step-detail\">\n      <div class=\"marker\">Step 03 · Selected<b>Apply<\u002Fb><\u002Fdiv>\n      <div class=\"content\">\n        <h3>Use the method that fits the person, not the default.<\u002Fh3>\n        <p>If the person prefers written communication, switch to a notepad or the patient portal. If they need extra time, give it — and tell colleagues why the visit is running long. Defaults are convenient for systems, not for people.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"action\">Open step 3 →<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-footer\">\n      <div class=\"left\">\n        <span class=\"tag\">Guide 01<\u002Fspan>\n        <span>Shared across all 18 guides · Decision Path<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================== -->\n  <!-- SLIDE 7 — SCENARIO                             -->\n  <!-- ============================================== -->\n  <section class=\"s-scenario\" data-screen-label=\"07 Scenario\">\n    <div class=\"topbar\">\n      <div class=\"brand-wrap\"><button class=\"menu-btn\" data-nav=\"open\" aria-label=\"Open course menu\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"><\u002Fline><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"><\u002Fline><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fbutton><div class=\"brand\"><img class=\"logo\" src=\"7d104576-0392-4d89-8389-96b5ae5bfd12\" alt=\"UHN — Canada’s Hospital\"><span class=\"sep\"><\u002Fspan><span class=\"ctx\">Accessibility First<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"crumbs\">Guide 01 · Foundations &nbsp;›&nbsp; <b>Scenario · Branching activity<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"title-block\">\n      <div class=\"eyebrow\">Section 06 · Make a decision · 3 options · branching<\u002Fdiv>\n      <h1>Scenario · A patient at <span class=\"accent\">reception<\u002Fspan><\u002Fh1>\n      <p class=\"lede\">You are the first person a patient meets today. The next 30 seconds will shape the rest of their visit.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"scen-grid\">\n      <image-slot id=\"s07-scenario\" class=\"photo\" shape=\"rect\" placeholder=\"Drop a scenario photo\">\n        <span class=\"badge\">REALISTIC PHOTO<\u002Fspan>\n      <\u002Fimage-slot>\n\n      <div>\n        <div class=\"scenario-box\">\n          <div class=\"lbl\">Scenario · Foundations 01<\u002Fdiv>\n          <h2>Meet Dahlia<\u002Fh2>\n          <p>Dahlia arrives 10 minutes early for an outpatient appointment. As you ask for her health card, she points to her ear, then to a small ASL card on the counter. The clinic is busy and you're behind on intake.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"scenario-q\">What is the most accessible next step?<\u002Fdiv>\n\n        <div class=\"options\">\n          <div class=\"option\">\n            <span class=\"ltr\">A<\u002Fspan>\n            <div>Speak louder and slower while continuing the intake script.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"option sel\">\n            <span class=\"ltr\">B<\u002Fspan>\n            <div><b>Make eye contact, gesture to the seating area, and request an interpreter using the bedside iPad before continuing intake.<\u002Fb><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"option\">\n            <span class=\"ltr\">C<\u002Fspan>\n            <div>Ask the person standing next to her to help translate while you keep working.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"feedback\">\n          <b>Feedback appears here after selection.<\u002Fb> Each choice opens a brief realistic outcome — what Dahlia experiences, what the chart records, and which step of the Decision Path it reinforces.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-footer\">\n      <div class=\"left\">\n        <span class=\"tag\">Guide 01<\u002Fspan>\n        <span>Scenario 1 of 3 · Reception · Communication accessibility<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================== -->\n  <!-- SLIDE 8 — KNOWLEDGE CHECK                      -->\n  <!-- ============================================== -->\n  <section class=\"s-kc\" data-screen-label=\"08 Knowledge Check\">\n    <div class=\"topbar\">\n      <div class=\"brand-wrap\"><button class=\"menu-btn\" data-nav=\"open\" aria-label=\"Open course menu\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"><\u002Fline><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"><\u002Fline><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fbutton><div class=\"brand\"><img class=\"logo\" src=\"7d104576-0392-4d89-8389-96b5ae5bfd12\" alt=\"UHN — Canada’s Hospital\"><span class=\"sep\"><\u002Fspan><span class=\"ctx\">Accessibility First · Knowledge Check<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"crumbs\">Guide 01 · Foundations &nbsp;›&nbsp; <b>Question 1 of 1<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"title-block\">\n      <div class=\"eyebrow\" style=\"color:var(--cobalt);\">Section 07 · Choose the best response<\u002Fdiv>\n      <h1 style=\"color:var(--navy);\">Knowledge Check<\u002Fh1>\n      <p class=\"lede\">A short check-in. Choose the response that best reflects the foundations of accessible care at UHN.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"kc-grid\">\n      <div class=\"kc-question\">\n        <div class=\"lbl\">Question<\u002Fdiv>\n        <h2>Which model of disability focuses on barriers in the environment, rather than on individual deficits?<\u002Fh2>\n\n        <div class=\"kc-options\">\n          <div class=\"kc-opt\">\n            <span class=\"ltr\">A<\u002Fspan>\n            <div>The medical model<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"kc-opt correct\">\n            <span class=\"ltr\">B<\u002Fspan>\n            <div>The social / environmental model<\u002Fdiv>\n            <span class=\"mark\">Correct<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"kc-opt wrong\">\n            <span class=\"ltr\">C<\u002Fspan>\n            <div>The charity model<\u002Fdiv>\n            <span class=\"mark\">Incorrect<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"kc-opt\">\n            <span class=\"ltr\">D<\u002Fspan>\n            <div>The rehabilitation model<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"kc-states\">\n          <div class=\"kc-state s-correct\"><b>State: Correct<\u002Fb><span style=\"margin-left:auto;color:var(--muted);\">Chartreuse panel · advance enabled<\u002Fspan><\u002Fdiv>\n          <div class=\"kc-state s-wrong\"><b>State: Incorrect<\u002Fb><span style=\"margin-left:auto;color:var(--muted);\">Red panel · \"Try again\" hint<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"kc-feedback\">\n        <div class=\"head\">\n          <span class=\"icon\">✓<\u002Fspan>\n          That's right — well done.\n        <\u002Fdiv>\n        <div class=\"body\">\n          <p>The <b>social / environmental model<\u002Fb> places responsibility on systems, spaces, and attitudes — not on the person.<\u002Fp>\n          <p>At UHN, this is the model behind the Accessibility in Practice framework: if the building, the form, or the staff response is the barrier, those are the things we change first.<\u002Fp>\n          <div class=\"alt\">\n            <b>If incorrect:<\u002Fb> the panel turns red with a brief explanation of the chosen model and a \"Try again\" button. After 2 attempts the correct answer is revealed.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-footer\">\n      <div class=\"left\">\n        <span class=\"tag\" style=\"color:var(--cobalt);\">Knowledge Check<\u002Fspan>\n        <span>Q1 · 1 of 1 attempts · weight 5% toward completion<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================== -->\n  <!-- SLIDE 9 — INCLUSIVE PRACTICE TIP               -->\n  <!-- ============================================== -->\n  <section class=\"s-tip\" data-screen-label=\"09 Practice Tip\">\n    <div class=\"topbar\">\n      <div class=\"brand-wrap\"><button class=\"menu-btn\" data-nav=\"open\" aria-label=\"Open course menu\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"><\u002Fline><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"><\u002Fline><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fbutton><div class=\"brand\"><img class=\"logo\" src=\"7d104576-0392-4d89-8389-96b5ae5bfd12\" alt=\"UHN — Canada’s Hospital\"><span class=\"sep\"><\u002Fspan><span class=\"ctx\">Accessibility First<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"crumbs\">Guide 01 · Foundations &nbsp;›&nbsp; <b>Inclusive Practice Tip<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"title-block\">\n      <div class=\"eyebrow\" style=\"color:var(--chartreuse);\">Section 08 · Positive guidance — do this<\u002Fdiv>\n      <h1>Inclusive Practice Tip<\u002Fh1>\n      <p class=\"lede\">One small habit that compounds across every shift, every team, and every patient interaction at UHN.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"tip-grid\">\n      <div class=\"tip-card\">\n        <div class=\"lbl\"><span class=\"dot\"><\u002Fspan> Practice Tip · 01 of 18<\u002Fdiv>\n        <h2>Ask, don't assume — and confirm what works.<\u002Fh2>\n        <p class=\"lead\">Before adjusting anything for a patient, ask them how they would prefer to be supported. Then confirm out loud that what you tried is working.<\u002Fp>\n\n        <div class=\"tip-steps\">\n          <div class=\"tip-step\"><span class=\"n\">→<\u002Fspan><div><b>Ask the question first.<\u002Fb> \"Is there anything I can do to make this easier for you today?\"<\u002Fdiv><\u002Fdiv>\n          <div class=\"tip-step\"><span class=\"n\">→<\u002Fspan><div><b>Offer specific support, not vague help.<\u002Fb> \"Would you like me to read the form aloud, or would a large-print copy work better?\"<\u002Fdiv><\u002Fdiv>\n          <div class=\"tip-step\"><span class=\"n\">→<\u002Fspan><div><b>Confirm what worked.<\u002Fb> \"Was that pace okay, or shall I slow down?\" Then note it in the chart for next time.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"tip-side\">\n        <div class=\"tip-infographic\" role=\"region\" aria-label=\"Ask &amp; Confirm interactive flow\">\n          <div class=\"ti-head\">\n            <span class=\"ti-lbl\">Interactive Infographic<\u002Fspan>\n            <span class=\"ti-cta\">Click a node →<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"ti-canvas\">\n            <svg class=\"ti-bg\" viewBox=\"0 0 400 280\" preserveAspectRatio=\"none\" aria-hidden=\"true\">\n              <path d=\"M 70 70 Q 200 30 330 70 Q 360 140 330 210 Q 200 250 70 210 Q 40 140 70 70 Z\" fill=\"none\" stroke=\"#74AE54\" stroke-width=\"3\" stroke-dasharray=\"6 8\" opacity=\"0.5\"><\u002Fpath>\n            <\u002Fsvg>\n            <button class=\"ti-node n1\" aria-label=\"Step 1 — Ask\">\n              <span class=\"num\">01<\u002Fspan>\n              <span class=\"lbl\">Ask<\u002Fspan>\n              <span class=\"hint\">\"How can I make this easier?\"<\u002Fspan>\n            <\u002Fbutton>\n            <button class=\"ti-node n2\" aria-label=\"Step 2 — Offer specifics\">\n              <span class=\"num\">02<\u002Fspan>\n              <span class=\"lbl\">Offer<\u002Fspan>\n              <span class=\"hint\">Specific support, not vague help.<\u002Fspan>\n            <\u002Fbutton>\n            <button class=\"ti-node n3\" aria-label=\"Step 3 — Confirm\">\n              <span class=\"num\">03<\u002Fspan>\n              <span class=\"lbl\">Confirm<\u002Fspan>\n              <span class=\"hint\">\"Did that work for you?\"<\u002Fspan>\n            <\u002Fbutton>\n            <button class=\"ti-node n4 active\" aria-label=\"Step 4 — Document\">\n              <span class=\"num\">04<\u002Fspan>\n              <span class=\"lbl\">Document<\u002Fspan>\n              <span class=\"hint\">Note it for the next colleague.<\u002Fspan>\n            <\u002Fbutton>\n            <div class=\"ti-center\">\n              <div class=\"ti-center-num\">Compound effect<\u002Fdiv>\n              <div class=\"ti-center-val\">1 habit × every patient<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"tip-quote\">\n          <div class=\"lbl\">From a UHN patient advisor<\u002Fdiv>\n          <p>\"The single best thing a clinician ever did for me was ask, before they did anything. It is the smallest thing and it changes everything.\"<\u002Fp>\n          <div class=\"who\">— D. K. · UHN Patient &amp; Family Advisor<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-footer\">\n      <div class=\"left\">\n        <span class=\"tag\" style=\"color:var(--chartreuse);\">Practice Tip<\u002Fspan>\n        <span>Repeated at the same point in every guide · 1 tip per module<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================== -->\n  <!-- SLIDE 10 — MAP / MY ACTION PLANNING            -->\n  <!-- ============================================== -->\n  <section class=\"s-map\" data-screen-label=\"10 MAP Activity\">\n    <div class=\"topbar\">\n      <div class=\"brand-wrap\"><button class=\"menu-btn\" data-nav=\"open\" aria-label=\"Open course menu\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"><\u002Fline><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"><\u002Fline><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fbutton><div class=\"brand\"><img class=\"logo\" src=\"7d104576-0392-4d89-8389-96b5ae5bfd12\" alt=\"UHN — Canada’s Hospital\"><span class=\"sep\"><\u002Fspan><span class=\"ctx\">Accessibility First · MAP<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"crumbs\">Guide 01 · Foundations &nbsp;›&nbsp; <b>My Action Planning<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"title-block\">\n      <div class=\"eyebrow\" style=\"color:var(--lilac);\">Section 09 · A quiet moment to commit · 3 fields<\u002Fdiv>\n      <h1>My Action Planning <span style=\"color:var(--lilac)\">(MAP)<\u002Fspan><\u002Fh1>\n      <p class=\"lede\">Before you close this guide, name three small commitments. Your MAP saves to your learner profile and travels with you across the 18 guides.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"map-grid\">\n      <div class=\"map-intro\">\n        <h2>Three lines. Five minutes. <span class=\"lilac\">A different next shift.<\u002Fspan><\u002Fh2>\n        <p>MAP is intentionally short and private. It is for you — not for review by your manager. The system stores only what you choose to save.<\u002Fp>\n        <p>You can return to your MAP at any time from the learner dashboard and update it after a real patient interaction.<\u002Fp>\n\n        <div class=\"map-meta\">\n          <div class=\"m\"><div class=\"k\">Saved to<\u002Fdiv><div class=\"v\">My UHN learner profile<\u002Fdiv><\u002Fdiv>\n          <div class=\"m\"><div class=\"k\">Privacy<\u002Fdiv><div class=\"v\">Private · not visible to manager<\u002Fdiv><\u002Fdiv>\n          <div class=\"m\"><div class=\"k\">Reusable across<\u002Fdiv><div class=\"v\">All 18 guides in the series<\u002Fdiv><\u002Fdiv>\n          <div class=\"m\"><div class=\"k\">Download<\u002Fdiv><div class=\"v\">PDF · printable wallet card<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"map-fields\">\n        <div class=\"map-field\">\n          <div class=\"head\"><span class=\"badge\">Stop<\u002Fspan><h3>One thing I will stop doing<\u002Fh3><\u002Fdiv>\n          <div class=\"input\">Type your response · e.g. \"I will stop speaking to the companion when the patient is present.\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"map-field filled\">\n          <div class=\"head\"><span class=\"badge\">Start<\u002Fspan><h3>One thing I will start doing<\u002Fh3><\u002Fdiv>\n          <div class=\"input\">I will ask every patient at intake if there is anything I can do to make the visit easier.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"map-field\">\n          <div class=\"head\"><span class=\"badge\">Continue<\u002Fspan><h3>One thing I will continue doing<\u002Fh3><\u002Fdiv>\n          <div class=\"input\">Type your response · optional<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"map-actions\">\n          <div class=\"map-btn dl\">Download as PDF<\u002Fdiv>\n          <div class=\"map-btn save\">Save my MAP →<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-footer\">\n      <div class=\"left\">\n        <span class=\"tag\" style=\"color:var(--lilac);\">MAP Activity<\u002Fspan>\n        <span>Closing reflection · same structure for every guide<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================== -->\n  <!-- SLIDE 11 — KEY TAKEAWAYS                       -->\n  <!-- ============================================== -->\n  <section class=\"s-take\" data-screen-label=\"11 Key Takeaways\">\n    <div class=\"topbar\">\n      <div class=\"brand-wrap\"><button class=\"menu-btn\" data-nav=\"open\" aria-label=\"Open course menu\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"><\u002Fline><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"><\u002Fline><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fbutton><div class=\"brand\"><img class=\"logo\" src=\"7d104576-0392-4d89-8389-96b5ae5bfd12\" alt=\"UHN — Canada’s Hospital\"><span class=\"sep\"><\u002Fspan><span class=\"ctx\">Accessibility First<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"crumbs\">Guide 01 · Foundations &nbsp;›&nbsp; <b>Key Takeaways<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"title-block\">\n      <div class=\"eyebrow\">Section 10 · What to carry into tomorrow's shift<\u002Fdiv>\n      <h1>Key Takeaways from <span class=\"accent\">Guide 01<\u002Fspan><\u002Fh1>\n      <p class=\"lede\">Four ideas to hold on to — and one downloadable job aid you can keep at your workstation.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"take-grid\">\n      <div class=\"take-card\">\n        <span class=\"n\">Takeaway 01<\u002Fspan>\n        <h3>Accessibility is broader than the building.<\u002Fh3>\n        <p>Most barriers at UHN are attitudinal, communication-based, or systemic — not physical. Treat all four the same way.<\u002Fp>\n        <span class=\"ref\">Linked to · Slide 04<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"take-card\">\n        <span class=\"n\">Takeaway 02<\u002Fspan>\n        <h3>Use four areas, every time.<\u002Fh3>\n        <p>Awareness, Communication, Environment, Response — a shared model across every guide and every role at UHN.<\u002Fp>\n        <span class=\"ref\">Linked to · Slide 05<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"take-card\">\n        <span class=\"n\">Takeaway 03<\u002Fspan>\n        <h3>Pause, listen, apply, adapt, seek support.<\u002Fh3>\n        <p>The 5-step Decision Path makes any accessibility decision repeatable — from intake to discharge.<\u002Fp>\n        <span class=\"ref\">Linked to · Slide 06<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"take-card\">\n        <span class=\"n\">Takeaway 04<\u002Fspan>\n        <h3>Ask before you adjust.<\u002Fh3>\n        <p>The patient is the expert on their own needs. Your job is to make space for them to tell you what works.<\u002Fp>\n        <span class=\"ref\">Linked to · Slides 07 &amp; 09<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"take-card\">\n        <span class=\"n\">Takeaway 05<\u002Fspan>\n        <h3>Document what worked.<\u002Fh3>\n        <p>A short note in the chart turns one good interaction into a pattern the next colleague can follow.<\u002Fp>\n        <span class=\"ref\">Linked to · Practice Tip<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"take-card\" style=\"border-left:4px solid var(--cobalt);\">\n        <span class=\"n\" style=\"color:var(--cobalt);\">Reflection<\u002Fspan>\n        <h3 style=\"color:var(--cobalt);\">Which takeaway would change one thing about your next shift?<\u002Fh3>\n        <p>Hold this question in mind as you close the guide — your MAP is one click away.<\u002Fp>\n        <span class=\"ref\">Linked to · Slide 10<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"take-footer\">\n      <div class=\"job-aid\">\n        <div class=\"ico\">PDF<\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"name\">Foundations Job Aid · Pocket Card<\u002Fdiv>\n          <div class=\"sub\">Decision Path · 4 Areas · Practice Tip · 1 page · 8.5 × 11<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dl\">Download ↓<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"nav-btn back\">← Back to MAP<\u002Fdiv>\n      <div class=\"nav-btn complete\">Complete Module<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-footer\">\n      <div class=\"left\">\n        <span class=\"tag\">Guide 01<\u002Fspan>\n        <span>Estimated reading: 2 minutes · Job aid: 1 page<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================== -->\n  <!-- SLIDE 12 — PODCAST / AUDIO                     -->\n  <!-- ============================================== -->\n  <section class=\"s-podcast\" data-screen-label=\"12 Podcast\">\n    <div class=\"topbar\">\n      <div class=\"brand-wrap\"><button class=\"menu-btn\" data-nav=\"open\" aria-label=\"Open course menu\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"><\u002Fline><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"><\u002Fline><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fbutton><div class=\"brand\"><img class=\"logo\" src=\"7d104576-0392-4d89-8389-96b5ae5bfd12\" alt=\"UHN — Canada’s Hospital\"><span class=\"sep\"><\u002Fspan><span class=\"ctx\">Accessibility First · Audio<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"crumbs\">Guide 01 · Foundations &nbsp;›&nbsp; <b>Listen &amp; Reflect<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"title-block\">\n      <div class=\"eyebrow\" style=\"color:var(--cobalt);\">Section 11 · Audio learning · 2 min 30 sec<\u002Fdiv>\n      <h1>Listen and Reflect: <span style=\"color:var(--cobalt);\">Accessibility in Everyday Care<\u002Fspan><\u002Fh1>\n      <p class=\"lede\">A short patient-advisor reflection on what good accessibility actually feels like at the front desk. Captions and a full transcript are always available.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"pod-grid\">\n      <div class=\"pod-player\">\n        <div class=\"pod-cover\">\n          <span class=\"ep\">Episode 01 of 18 · Foundations<\u002Fspan>\n          <span class=\"show\">A patient advisor on dignity at intake<\u002Fspan>\n          <span class=\"wave\"><\u002Fspan>\n          <span class=\"wave-bars\">\n            <span style=\"height:14px;\"><\u002Fspan>\n            <span style=\"height:32px;\"><\u002Fspan>\n            <span style=\"height:56px;\"><\u002Fspan>\n            <span style=\"height:24px;\"><\u002Fspan>\n            <span style=\"height:72px;\"><\u002Fspan>\n            <span style=\"height:42px;\"><\u002Fspan>\n            <span style=\"height:18px;\"><\u002Fspan>\n            <span style=\"height:54px;\"><\u002Fspan>\n            <span style=\"height:30px;\"><\u002Fspan>\n            <span style=\"height:10px;\"><\u002Fspan>\n          <\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"pod-controls\">\n          <div class=\"pod-meta\">\n            <button class=\"pod-play\" aria-label=\"Play episode\"><svg viewBox=\"0 0 24 24\"><polygon points=\"6,4 6,20 20,12\"><\u002Fpolygon><\u002Fsvg><\u002Fbutton>\n            <div class=\"info\">\n              <div class=\"ttl\">Dignity starts before the appointment.<\u002Fdiv>\n              <div class=\"sub\">D. K. · UHN Patient &amp; Family Advisor<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"time\"><span class=\"now\">0:53<\u002Fspan> / 2:30<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"pod-progress\"><div class=\"fill\"><\u002Fdiv><\u002Fdiv>\n\n          <div class=\"pod-secondary\">\n            <button class=\"pod-btn primary\"><span class=\"ico\">CC<\u002Fspan>Captions on<\u002Fbutton>\n            <button class=\"pod-btn\">1.0×<\u002Fbutton>\n            <button class=\"pod-btn\">Open transcript<\u002Fbutton>\n            <button class=\"pod-btn\" style=\"margin-left:auto;\">Download · MP3<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"pod-side\">\n        <div class=\"pod-points\">\n          <div class=\"lbl\">Key listening points<\u002Fdiv>\n          <h3>Three moments to listen for<\u002Fh3>\n          <ul>\n            <li><span class=\"tc\">00:18<\u002Fspan>Why a tone of voice at intake matters more than the form.<\u002Fli>\n            <li><span class=\"tc\">01:02<\u002Fspan>How \"ask, then confirm\" prevented a wrong assumption.<\u002Fli>\n            <li><span class=\"tc\">01:54<\u002Fspan>One sentence every staff member can use on a busy shift.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"pod-reflection\">\n          <div class=\"lbl\">Reflection prompt · after listening<\u002Fdiv>\n          <p>Think of one patient interaction this week. Which moment would have shifted if you had paused to ask, before you acted?<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-footer\">\n      <div class=\"left\">\n        <span class=\"tag\" style=\"color:var(--cobalt);\">Audio Module<\u002Fspan>\n        <span>Transcript &amp; captions always on · downloadable MP3<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================== -->\n  <!-- SLIDE 13 — DECISION TREE                       -->\n  <!-- ============================================== -->\n  <section class=\"s-tree\" data-screen-label=\"13 Decision Tree\">\n    <div class=\"topbar\">\n      <div class=\"brand-wrap\"><button class=\"menu-btn\" data-nav=\"open\" aria-label=\"Open course menu\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"><\u002Fline><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"><\u002Fline><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fbutton><div class=\"brand\"><img class=\"logo\" src=\"7d104576-0392-4d89-8389-96b5ae5bfd12\" alt=\"UHN — Canada’s Hospital\"><span class=\"sep\"><\u002Fspan><span class=\"ctx\">Accessibility First · Decision Tree<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"crumbs\">Guide 01 · Foundations &nbsp;›&nbsp; <b>Choose the best response<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"title-block\">\n      <div class=\"eyebrow\">Section 12 · Branching decision activity<\u002Fdiv>\n      <h1>Choose the <span class=\"accent\">best accessibility response<\u002Fspan><\u002Fh1>\n      <p class=\"lede\">Three first-step options. One is recommended. Each opens a different consequence panel — then loops back to the Accessibility Decision Path.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"tree-grid\">\n      <div class=\"tree-scenario\">\n        <span class=\"lbl\">Scenario · Intake<\u002Fspan>\n        <div>\n          <h3>The patient is frustrated trying to complete the intake form.<\u002Fh3>\n          <p>You don't yet know whether the barrier is vision, language, digital access, cognitive load, or something else. The lobby is busy and three people are waiting behind them.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"meta\">Time on task<b>3 minutes<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"tree-canvas\">\n        <div class=\"tree-question\">\n          <div class=\"q-lbl\">Decision · First step<\u002Fdiv>\n          <h2>What do you do next, before assuming the cause?<\u002Fh2>\n          <div class=\"q-foot\">Pick the option that best reflects \"Pause &amp; Assess\" — the first step of the Accessibility Decision Path.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"tree-branches\">\n          <button class=\"tree-branch warn\">\n            <span class=\"ltr\">A<\u002Fspan>\n            <div class=\"body\">\n              <div class=\"ttl\">Continue with the standard intake process.<\u002Fdiv>\n              <div class=\"sub\">Keep working through the form so the line keeps moving.<\u002Fdiv>\n            <\u002Fdiv>\n            <span class=\"state\">Needs improvement<\u002Fspan>\n          <\u002Fbutton>\n\n          <button class=\"tree-branch recommended\">\n            <span class=\"ltr\">B<\u002Fspan>\n            <div class=\"body\">\n              <div class=\"ttl\">Pause and ask how to support the patient.<\u002Fdiv>\n              <div class=\"sub\">\"Is there anything I can do to make this form easier today?\"<\u002Fdiv>\n            <\u002Fdiv>\n            <span class=\"state\">Recommended ✓<\u002Fspan>\n          <\u002Fbutton>\n\n          <button class=\"tree-branch selected\">\n            <span class=\"ltr\">C<\u002Fspan>\n            <div class=\"body\">\n              <div class=\"ttl\">Ask another staff member to take over.<\u002Fdiv>\n              <div class=\"sub\">Hand off to a colleague while you keep the queue moving.<\u002Fdiv>\n            <\u002Fdiv>\n            <span class=\"state\">Selected<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tree-feedback\">\n      <div class=\"fb-card good\">\n        <div class=\"fb-head\">\n          <span class=\"fb-pill\">Feedback for B · Recommended<\u002Fspan>\n        <\u002Fdiv>\n        <h4>This is the dignified first move.<\u002Fh4>\n        <p>Pausing and asking, before assuming, is the single behaviour that distinguishes accessible care from \"trying our best\". The patient names the barrier — vision, language, digital, cognitive, or something else — and you act on what they actually need.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"fb-coach\">\n        <div class=\"lbl\">Loop back to · Accessibility Decision Path<\u002Fdiv>\n        <h4>You are practicing step 01 — Pause &amp; Assess.<\u002Fh4>\n        <div class=\"path\">\n          <span class=\"step on\">01 Pause<\u002Fspan>\n          <span class=\"arr\">→<\u002Fspan>\n          <span class=\"step\">02 Listen<\u002Fspan>\n          <span class=\"arr\">→<\u002Fspan>\n          <span class=\"step\">03 Apply<\u002Fspan>\n          <span class=\"arr\">→<\u002Fspan>\n          <span class=\"step\">04 Adapt<\u002Fspan>\n          <span class=\"arr\">→<\u002Fspan>\n          <span class=\"step\">05 Support<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chrome-footer\">\n      <div class=\"left\">\n        <span class=\"tag\">Decision Tree<\u002Fspan>\n        <span>3 branches · 1 recommended path · all options open feedback layers<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ============================================== -->\n  <!-- ============================================== -->\n  <!-- SLIDE 14 — 18-GUIDE PROGRESS                   -->\n  <!-- ============================================== -->\n  <section class=\"s-progress\" data-screen-label=\"14 Series Progress\">\n    <div class=\"topbar\">\n      <div class=\"brand-wrap\"><button class=\"menu-btn\" data-nav=\"open\" aria-label=\"Open course menu\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"><\u002Fline><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"><\u002Fline><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fbutton><div class=\"brand\"><img class=\"logo\" src=\"7d104576-0392-4d89-8389-96b5ae5bfd12\" alt=\"UHN — Canada’s Hospital\"><span class=\"sep\"><\u002Fspan><span class=\"ctx\">Accessibility First · Series Map<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"crumbs\">Guide 01 · Foundations &nbsp;›&nbsp; <b>Your progress across the 18 guides<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"title-block\">\n      <div class=\"eyebrow\">Series progress · Stages unlock as you complete<\u002Fdiv>\n      <h1>Accessibility First · <span class=\"accent\">A three-stage journey<\u002Fspan><\u002Fh1>\n      <p class=\"lede\">Guides unlock by stage. Foundations open everything else. Complete all nine of the first two stages to unlock applied practice.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"journey\">\n      <div class=\"j-path\">\n        <span>Your Path<\u002Fspan>\n        <span class=\"ball on\"><\u002Fspan>\n        <span class=\"line on\"><\u002Fspan>\n        <span class=\"ball\"><\u002Fspan>\n        <span class=\"line\"><\u002Fspan>\n        <span class=\"ball\"><\u002Fspan>\n        <span style=\"color:var(--cobalt);\">Stage 1 of 3<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"journey-stages\">\n\n        <!-- STAGE 1 — FOUNDATIONS (ACTIVE

"row\">\n      <img class=\"sm-logo\" src=\"7d104576-0392-4d89-8389-96b5ae5bfd12\" alt=\"UHN — Canada’s Hospital\">\n      <button class=\"sm-close\" id=\"navClose\" aria-label=\"Close menu\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div>\n      <div class=\"sm-eyebrow\">Guide 01 of 18 · Foundations<\u002Fdiv>\n      <div class=\"sm-title\">Foundations of Disability, Inclusion &amp; Accessible Design<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sm-progress-row\">\n      <div class=\"sm-progress\"><div class=\"sm-progress-fill\" id=\"navProgressFill\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"sm-progress-text\" id=\"navProgressText\">1 / 12<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sm-list\" id=\"navList\">\n    <div class=\"sm-section\">Module · Guide 01<\u002Fdiv>\n    <!-- items injected by JS -->\n  <\u002Fdiv>\n\n  <div class=\"sm-foot\">\n    <b>Course Navigator<\u002Fb> · Use ←/→ to step. Press <b>M<\u002Fb> to toggle this menu.\n  <\u002Fdiv>\n<\u002Faside>\n\n<!-- ============================================== -->\n<!-- TWEAKS PANEL                                   -->\n<!-- ============================================== -->\n<div class=\"tweaks\" id=\"tweaksPanel\" aria-label=\"Design tweaks\">\n  <div class=\"t-head\">\n    <div class=\"t-title\">Tweaks<\u002Fdiv>\n    <button class=\"t-close\" id=\"tweaksClose\" aria-label=\"Close tweaks\">×<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"t-body\">\n\n    <div class=\"t-section\">\n      <div class=\"t-label\">Imagery<\u002Fdiv>\n      <div class=\"t-seg\" data-tweak=\"imagery\">\n        <button data-val=\"illustration\">Illustrations<\u002Fbutton>\n        <button data-val=\"placeholder\">Placeholders<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"t-hint\">Toggle between flat illustrations and the storyboard-style striped placeholders.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"t-section\">\n      <div class=\"t-label\">Module Accent (red role)<\u002Fdiv>\n      <div class=\"t-swatches\" data-tweak=\"accent\">\n        <div class=\"t-swatch\" data-val=\"red\" style=\"background:#C0233B;\"><span class=\"lbl\">RED<\u002Fspan><\u002Fdiv>\n        <div class=\"t-swatch\" data-val=\"cobalt\" style=\"background:#245BAA;\"><span class=\"lbl\">COBALT<\u002Fspan><\u002Fdiv>\n        <div class=\"t-swatch\" data-val=\"lilac\" style=\"background:#C48ABD;\"><span class=\"lbl\">LILAC<\u002Fspan><\u002Fdiv>\n        <div class=\"t-swatch\" data-val=\"chart\" style=\"background:#74AE54;\"><span class=\"lbl\">CHART<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"t-hint\">Swap the red accent for a different module-level tone. Other UHN accents (cobalt, chartreuse) stay in their roles.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"t-section\">\n      <div class=\"t-label\">Density<\u002Fdiv>\n      <div class=\"t-seg\" data-tweak=\"density\">\n        <button data-val=\"comfortable\">Comfortable<\u002Fbutton>\n        <button data-val=\"compact\">Compact<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"t-section\">\n      <div class=\"t-label\">Chrome<\u002Fdiv>\n      <div class=\"t-seg\" data-tweak=\"crumbs\">\n        <button data-val=\"on\">Crumbs on<\u002Fbutton>\n        <button data-val=\"off\">Crumbs off<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"t-seg\" style=\"margin-top:8px;\" data-tweak=\"footer\">\n        <button data-val=\"on\">Footer on<\u002Fbutton>\n        <button data-val=\"off\">Footer off<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script src=\"8f1e9fa8-155e-48bb-9043-e1a38571a528\"><\u002Fscript>\n<script>\n(function () {\n  // ---------- Tweak defaults (persistable) ----------\n  const TWEAKS = /*EDITMODE-BEGIN*/{\n    \"imagery\": \"placeholder\",\n    \"accent\": \"red\",\n    \"density\": \"comfortable\",\n    \"crumbs\": \"on\",\n    \"footer\": \"on\"\n  }/*EDITMODE-END*/;\n\n  // ---------- Slide titles for side menu ----------\n  const SLIDES = [\n    { n: \"01\", name: \"Title\",              status: \"Done\",     done: true  },\n    { n: \"02\", name: \"Learning Objectives\", status: \"Done\",     done: true  },\n    { n: \"03\", name: \"Why This Matters\",    status: \"Done\",     done: true  },\n    { n: \"04\", name: \"Core Concept\",        status: \"Done\",     done: true  },\n    { n: \"05\", name: \"Accessibility in Practice\", status: \"Active\", done: false },\n    { n: \"06\", name: \"Decision Path\",       status: \"5 steps\",  done: false },\n    { n: \"07\", name: \"Scenario Activity\",   status: \"Branching\",done: false },\n    { n: \"08\", name: \"Knowledge Check\",     status: \"1 question\", done: false },\n    { n: \"09\", name: \"Inclusive Practice Tip\", status: \"Tip\", done: false },\n    { n: \"10\", name: \"MAP · Action Planning\",  status: \"Reflection\", done: false },\n    { n: \"11\", name: \"Key Takeaways\",       status: \"5 cards\",  done: false },\n    { n: \"12\", name: \"Podcast · Listen & Reflect\", status: \"Audio · 2:30\", done: false },\n    { n: \"13\", name: \"Decision Tree\",       status: \"Branching\", done: false },\n    { n: \"14\", name: \"Series Progress\",     status: \"Map · Final\", done: false },\n  ];\n\n  // ---------- Render icons on load (illustrations now live in image-slots) ----------\n  function renderIcons() {\n    if (!window.UHN_ILLUST) return;\n    document.querySelectorAll(\"[data-icon]\").forEach(function (el) {\n      if (el.querySelector(\"svg\")) return;\n      const name = el.getAttribute(\"data-icon\");\n      const color = el.getAttribute(\"data-icon-color\") || \"#ffffff\";\n      el.innerHTML = window.UHN_ILLUST.icon(name, color);\n    });\n  }\n\n  // ---------- Apply tweaks to DOM ----------\n  function applyTweaks() {\n    const body = document.body;\n    body.classList.toggle(\"imgs-placeholder\", TWEAKS.imagery === \"placeholder\");\n    body.classList.remove(\"accent-cobalt\", \"accent-lilac\", \"accent-chart\");\n    if (TWEAKS.accent === \"cobalt\") body.classList.add(\"accent-cobalt\");\n    else if (TWEAKS.accent === \"lilac\") body.classList.add(\"accent-lilac\");\n    else if (TWEAKS.accent === \"chart\") body.classList.add(\"accent-chart\");\n    body.classList.toggle(\"no-crumbs\", TWEAKS.crumbs === \"off\");\n    body.classList.toggle(\"no-footer\", TWEAKS.footer === \"off\");\n    body.classList.toggle(\"density-compact\", TWEAKS.density === \"compact\");\n    syncPanelUI();\n  }\n\n  function syncPanelUI() {\n    document.querySelectorAll(\".tweaks [data-tweak]\").forEach(function (group) {\n      const key = group.getAttribute(\"data-tweak\");\n      const cur = TWEAKS[key];\n      group.querySelectorAll(\"[data-val]\").forEach(function (btn) {\n        btn.classList.toggle(\"on\", btn.getAttribute(\"data-val\") === cur);\n      });\n    });\n  }\n\n  function setTweak(key, val) {\n    TWEAKS[key] = val;\n    applyTweaks();\n    try {\n      window.parent.postMessage({ type: \"__edit_mode_set_keys\", edits: { [key]: val } }, \"*\");\n    } catch (e) {}\n  }\n\n  function wirePanel() {\n    document.querySelectorAll(\".tweaks [data-tweak]\").forEach(function (group) {\n      const key = group.getAttribute(\"data-tweak\");\n      group.addEventListener(\"click\", function (e) {\n        const btn = e.target.closest(\"[data-val]\");\n        if (!btn) return;\n        setTweak(key, btn.getAttribute(\"data-val\"));\n      });\n    });\n    document.getElementById(\"tweaksClose\").addEventListener(\"click\", function () {\n      hideTweaksPanel();\n      try { window.parent.postMessage({ type: \"__edit_mode_dismissed\" }, \"*\"); } catch (e) {}\n    });\n  }\n  function showTweaksPanel() { document.getElementById(\"tweaksPanel\").classList.add(\"open\"); }\n  function hideTweaksPanel() { document.getElementById(\"tweaksPanel\").classList.remove(\"open\"); }\n\n  // ---------- Side menu ----------\n  function renderMenuList() {\n    const list = document.getElementById(\"navList\");\n    if (!list) return;\n    const items = SLIDES.map(function (slide, i) {\n      const cls = \"sm-item\" + (slide.done ? \" done\" : \"\");\n      return '<button class=\"' + cls + '\" data-goto=\"' + i + '\">' +\n        '<span class=\"sm-num\">' + slide.n + '<\u002Fspan>' +\n        '<span class=\"sm-name\">' + slide.name + '<\u002Fspan>' +\n        '<span class=\"sm-status\">' + slide.status + '<\u002Fspan>' +\n      '<\u002Fbutton>';\n    }).join(\"\");\n    list.insertAdjacentHTML(\"beforeend\", items);\n  }\n\n  function openMenu() {\n    document.body.classList.add(\"nav-open\");\n    document.getElementById(\"sideMenu\").setAttribute(\"aria-hidden\", \"false\");\n  }\n  function closeMenu() {\n    document.body.classList.remove(\"nav-open\");\n    document.getElementById(\"sideMenu\").setAttribute(\"aria-hidden\", \"true\");\n  }\n\n  function syncMenuActive(idx) {\n    const items = document.querySelectorAll(\".side-menu .sm-item\");\n    items.forEach(function (el, i) {\n      el.classList.toggle(\"active\", i === idx);\n    });\n    const fill = document.getElementById(\"navProgressFill\");\n    const text = document.getElementById(\"navProgressText\");\n    const total = SLIDES.length;\n    const pct = ((idx + 1) / total) * 100;\n    if (fill) fill.style.width = pct + \"%\";\n    if (text) text.textContent = (idx + 1) + \" / \" + total;\n  }\n\n  function wireMenu() {\n    const deck = document.querySelector(\"deck-stage\");\n    document.getElementById(\"navClose\").addEventListener(\"click\", closeMenu);\n    document.getElementById(\"navScrim\").addEventListener(\"click\", closeMenu);\n    document.querySelectorAll('[data-nav=\"open\"]').forEach(function (b) {\n      b.addEventListener(\"click\", function (e) { e.stopPropagation(); openMenu(); });\n    });\n\n    // Item click → navigate\n    document.getElementById(\"navList\").addEventListener(\"click\", function (e) {\n      const btn = e.target.closest(\"[data-goto]\");\n      if (!btn || !deck) return;\n      const i = parseInt(btn.getAttribute(\"data-goto\"), 10);\n      if (typeof deck.goTo === \"function\") deck.goTo(i);\n      closeMenu();\n    });\n\n    // Track active slide\n    if (deck) {\n      deck.addEventListener(\"slidechange\", function (e) {\n        const idx = (e.detail && typeof e.detail.to === \"number\") ? e.detail.to : 0;\n        syncMenuActive(idx);\n      });\n      // Initial\n      const cur = (deck.currentIndex != null) ? deck.currentIndex : 0;\n      syncMenuActive(cur);\n    }\n\n    // Keyboard: M toggles menu, Esc closes\n    document.addEventListener(\"keydown\", function (e) {\n      if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;\n      if (e.key === \"m\" || e.key === \"M\") {\n        if (document.body.classList.contains(\"nav-open\")) closeMenu();\n        else openMenu();\n      } else if (e.key === \"Escape\") {\n        closeMenu();\n      }\n    });\n  }\n\n  // ---------- Edit-mode bridge ----------\n  window.addEventListener(\"message\", function (ev) {\n    const t = ev.data && ev.data.type;\n    if (t === \"__activate_edit_mode\") showTweaksPanel();\n    else if (t === \"__deactivate_edit_mode\") hideTweaksPanel();\n  });\n  try { window.parent.postMessage({ type: \"__edit_mode_available\" }, \"*\"); } catch (e) {}\n\n  // ---------- Init ----------\n  function init() {\n    renderIcons();\n    wirePanel();\n    renderMenuList();\n    wireMenu();\n    injectSlideNav();\n    applyTweaks();\n    // Also listen for window message (legacy speaker-note channel)\n    window.addEventListener(\"message\", function (ev) {\n      if (ev.data && typeof ev.data.slideIndexChanged === \"number\") {\n        syncMenuActive(ev.data.slideIndexChanged);\n      }\n    });\n  }\n\n  // ---------- Inject prev/next nav into every slide ----------\n  function injectSlideNav() {\n    const deck = document.querySelector(\"deck-stage\");\n    if (!deck) return;\n    const slides = Array.from(deck.querySelectorAll(\":scope > section\"));\n    const total = slides.length;\n    slides.forEach(function (sec, i) {\n      // Skip if already present\n      if (sec.querySelector(\":scope > .slide-nav\")) return;\n      // Slide 1 has its own Start/Continue Module CTA — skip nav there\n      if (i === 0) return;\n      const isFirst = i === 0;\n      const isLast = i === total - 1;\n      const nav = document.createElement(\"div\");\n      nav.className = \"slide-nav\";\n      nav.setAttribute(\"data-omelette-chrome\", \"\");\n      nav.innerHTML =\n        '<button class=\"sn-btn prev\" aria-label=\"Previous slide\"' + (isFirst ? ' disabled' : '') + '>' +\n          '<svg viewBox=\"0 0 24 24\"><polyline points=\"15 5 8 12 15 19\"/><\u002Fsvg>' +\n        '<\u002Fbutton>' +\n        '<div class=\"sn-label\">' +\n          '<span class=\"sn-lbl-k\">Slide<\u002Fspan>' +\n          '<span class=\"sn-lbl-v\">' + String(i + 1).padStart(2, \"0\") + ' / ' + String(total).padStart(2, \"0\") + '<\u002Fspan>' +\n        '<\u002Fdiv>' +\n        '<button class=\"sn-btn next\" aria-label=\"Next slide\"' + (isLast ? ' disabled' : '') + '>' +\n          '<svg viewBox=\"0 0 24 24\"><polyline points=\"9 5 16 12 9 19\"/><\u002Fsvg>' +\n        '<\u002Fbutton>';\n      sec.appendChild(nav);\n\n      nav.querySelector(\".prev\").addEventListener(\"click\", function () {\n        if (typeof deck.prev === \"function\") deck.prev();\n      });\n      nav.querySelector(\".next\").addEventListener(\"click\", function () {\n        if (typeof deck.next === \"function\") deck.next();\n      });\n    });\n  }\n  if (document.readyState === \"loading\") {\n    document.addEventListener(\"DOMContentLoaded\", init);\n  } else {\n    init();\n  }\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
